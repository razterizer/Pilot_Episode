#:schema https://raw.githubusercontent.com/razterizer/forge/main/schemas/forge.recipe.schema.json

[project]
name = "Pilot_Episode"
version = "1.3.3"
type = "executable"
cpp_std = 20

[build]
number = 9
defines = ["USE_APPLAUDIO"]

[release]
build_number_format = "dotted"

[sources]
paths = ["Pilot_Episode/pilot_episode.cpp"]

[runtime]
files = [{ source = "Pilot_Episode/chiptune2.ct", destination = "chiptune2.ct" }]

[dependencies]
8Beat = { github = "razterizer/8Beat", version = "1.0.2+build.4", variant = "applaudio" }
Termin8or = { github = "razterizer/Termin8or", version = "3.0.3+build.9" }

[profile.dev.dependencies]
8Beat = { path = "../lib/8Beat" }
Termin8or = { path = "../lib/Termin8or" }

[profile.workflow-release.build]
configuration = "Release"

[profile.Debug.build]
configuration = "Debug"
defines = ["DEBUG=1"]

[profile.Release.build]
configuration = "Release"
